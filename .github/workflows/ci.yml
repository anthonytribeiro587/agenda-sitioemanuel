name: CI

on:
  push:
    branches:
      - main
      - fix/vercel-build
      - redesign/calendar-workspace-20260714
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt
          retention-days: 1

      - name: Fail when lint reports errors
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1

      - name: Build
        run: npm run build
