name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: agenda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Security, lint, types, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Security and behavior tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Setup PostgreSQL parser
        run: python -m pip install --disable-pip-version-check pglast==8.2

      - name: Parse all migrations
        run: |
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql

          migrations = sorted(Path('supabase/migrations').glob('*.sql'))
          if not migrations:
              raise SystemExit('Nenhuma migration encontrada.')

          total = 0
          for path in migrations:
              statements = parse_sql(path.read_text(encoding='utf-8'))
              total += len(statements)
              print(f'{path}: {len(statements)} instruções válidas')
          print(f'Total validado: {total} instruções em {len(migrations)} migrations.')
          PY
